<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moje Artykuły - Laboratorium 6</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen">
    <div class="max-w-4xl mx-auto py-10 px-4">
        
        <h1 class="text-4xl font-bold mb-8 text-center text-blue-600">Lista Artykułów</h1>

        <div class="mb-6 flex justify-end">
            <label for="sortSelect" class="mr-3 mt-2 font-semibold">Sortuj:</label>
            <select id="sortSelect" class="border border-gray-300 rounded p-2 bg-white">
                <option value="created_at.asc">Po dacie rosnąco</option>
                <option value="created_at.desc">Po dacie malejąco</option>
                <option value="title.asc">Po nazwie alfabetycznie</option>
            </select>
        </div>

        <div id="articlesList" class="space-y-6 mb-12">
            <p class="text-center text-gray-500">Ładowanie artykułów...</p>
        </div>

        <div class="bg-white p-8 rounded-lg shadow-md border-t-4 border-blue-500">
            <h2 class="text-2xl font-bold mb-6">Dodaj nowy artykuł</h2>
            <form id="articleForm">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Tytuł *</label>
                        <input type="text" id="title" required class="w-full border rounded p-2 focus:ring focus:ring-blue-200">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Podtytuł</label>
                        <input type="text" id="subtitle" class="w-full border rounded p-2 focus:ring focus:ring-blue-200">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Autor *</label>
                        <input type="text" id="author" required class="w-full border rounded p-2 focus:ring focus:ring-blue-200">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Data (opcjonalnie)</label>
                        <input type="datetime-local" id="created_at" class="w-full border rounded p-2 focus:ring focus:ring-blue-200">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1">Treść *</label>
                    <textarea id="content" rows="4" required class="w-full border rounded p-2 focus:ring focus:ring-blue-200"></textarea>
                </div>
                <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">
                    Stwórz artykuł
                </button>
            </form>
        </div>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
